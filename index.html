<button id="generateTextButton">Generate ATC Text</button>

<div id="textContainer" style="display: none;">
  <!-- The ATC text will be inserted here by JavaScript -->
</div>

<script>
  document.getElementById('generateTextButton').addEventListener('click', function() {
    // Get the input elements
    var departureAirportInput = document.getElementById('departureAirport');
    var callsignInput = document.getElementById('callsign');
    var standNumberInput = document.getElementById('standNumber');
    var arrivalAirportInput = document.getElementById('arrivalAirport');
    var aircraftTypeSelect = document.getElementById('aircraftType'); // Changed to select

    // Get the label elements
    var departureAirportLabel = document.getElementById('departureAirportLabel');
    var callsignLabel = document.getElementById('callsignLabel');
    var standNumberLabel = document.getElementById('standNumberLabel');
    var arrivalAirportLabel = document.getElementById('arrivalAirportLabel');
    var aircraftTypeLabel = document.getElementById('aircraftTypeLabel');

    // Store original label texts
    var originalLabels = {
      departureAirport: "Departure Airport Name:",
      callsign: "Callsign:",
      standNumber: "Stand Number:",
      arrivalAirport: "Arrival Airport Name:",
      aircraftType: "Aircraft Type:"
    };

    // Store original placeholders (only for input fields)
    var originalPlaceholders = {
        departureAirport: departureAirportInput.placeholder,
        callsign: callsignInput.placeholder,
        standNumber: standNumberInput.placeholder,
        arrivalAirport: arrivalAirportInput.placeholder
    };


    var isValid = true; // Flag to track overall validation status

    // --- Reset previous error states ---
    departureAirportInput.classList.remove('error-input');
    departureAirportLabel.classList.remove('error-label');
    departureAirportLabel.textContent = originalLabels.departureAirport;
    departureAirportInput.placeholder = originalPlaceholders.departureAirport; // Reset placeholder

    callsignInput.classList.remove('error-input');
    callsignLabel.classList.remove('error-label');
    callsignLabel.textContent = originalLabels.callsign;
    callsignInput.placeholder = originalPlaceholders.callsign; // Reset placeholder

    standNumberInput.classList.remove('error-input');
    standNumberLabel.classList.remove('error-label');
    standNumberLabel.textContent = originalLabels.standNumber;
    standNumberInput.placeholder = originalPlaceholders.standNumber; // Reset placeholder

    arrivalAirportInput.classList.remove('error-input');
    arrivalAirportLabel.classList.remove('error-label');
    arrivalAirportLabel.textContent = originalLabels.arrivalAirport;
    arrivalAirportInput.placeholder = originalPlaceholders.arrivalAirport; // Reset placeholder

    // Reset error for the select element
    aircraftTypeSelect.classList.remove('error-input');
    aircraftTypeLabel.classList.remove('error-label');
    aircraftTypeLabel.textContent = originalLabels.aircraftType;
    // --- End Reset ---


    // --- Validation Checks ---

    // Check if Departure Airport is empty or not 4 characters
    var departureAirport = departureAirportInput.value.trim();
    if (departureAirport === '' || departureAirport.length !== 4) {
      departureAirportInput.classList.add('error-input');
      departureAirportLabel.classList.add('error-label');
      departureAirportLabel.textContent = originalLabels.departureAirport + " *";
      if (departureAirport === '') {
          departureAirportInput.placeholder = "Required!"; // Set error placeholder for empty
      } else {
          departureAirportInput.placeholder = "Must be 4 letters!"; // Set error placeholder for incorrect length
      }
      isValid = false;
    }

    // Check if Callsign is empty
    var callsign = callsignInput.value.trim();
    if (callsign === '') {
      callsignInput.classList.add('error-input');
      callsignLabel.classList.add('error-label');
      callsignLabel.textContent = originalLabels.callsign + " *";
      callsignInput.placeholder = "Required!"; // Set error placeholder
      isValid = false;
    }

    // Check Stand Number (empty, non-numeric, or less than 2 digits)
    var standNumber = standNumberInput.value.trim();
    var containsNonDigits = /\D/.test(standNumber);
    var isTooShort = standNumber.length < 2; // Check if length is less than 2

    if (standNumber === '' || containsNonDigits || isTooShort) {
      standNumberInput.classList.add('error-input');
      standNumberLabel.classList.add('error-label');
      standNumberLabel.textContent = originalLabels.standNumber + " *";

      if (standNumber === '') {
          standNumberInput.placeholder = "Required!"; // Empty
      } else if (containsNonDigits) {
          standNumberInput.placeholder = "Must Be A Number!"; // Non-digits
      } else if (isTooShort) {
          standNumberInput.placeholder = "At least 2 digits!"; // Too short
      }
      isValid = false;
    }


    // Check if Arrival Airport is empty or not 4 characters
    var arrivalAirport = arrivalAirportInput.value.trim();
    if (arrivalAirport === '' || arrivalAirport.length !== 4) {
      arrivalAirportInput.classList.add('error-input');
      arrivalAirportLabel.classList.add('error-label');
      arrivalAirportLabel.textContent = originalLabels.arrivalAirport + " *";
       if (arrivalAirport === '') {
          arrivalAirportInput.placeholder = "Required!"; // Set error placeholder for empty
      } else {
          arrivalAirportInput.placeholder = "Must be 4 letters!"; // Set error placeholder for incorrect length
      }
      isValid = false;
    }

    // Check if Aircraft Type is selected (value is not empty)
    var aircraftType = aircraftTypeSelect.value;
    if (aircraftType === '') {
      aircraftTypeSelect.classList.add('error-input');
      aircraftTypeLabel.classList.add('error-label');
      aircraftTypeLabel.textContent = originalLabels.aircraftType + " *";
      isValid = false;
    }

    // --- End Validation Checks ---


    if (!isValid) {
      // If validation failed, hide the generated text and clear inputs
      document.getElementById('textContainer').style.display = 'none';

      // --- Clear the input fields even if there's an error ---
      departureAirportInput.value = '';
      callsignInput.value = '';
      standNumberInput.value = ''; // Clear the invalid stand number
      arrivalAirportInput.value = '';
      aircraftTypeSelect.value = ''; // Reset the select to the default option
      // --- End Clear Input Fields ---

      return; // Stop the function execution
    }


    // Get the input values again (using trimmed values for consistency)
    var departureAirport = departureAirportInput.value.trim();
    var callsign = callsignInput.value.trim();
    var standNumber = standNumberInput.value.trim();
    var arrivalAirport = arrivalAirportInput.value.trim();
    var aircraftType = aircraftTypeSelect.value; // Get value from the select

    // The base ATC text with dynamic content
    var baseATCText = `How to talk to ATC ( Departure )

<span class="section-title">ATIS</span>

First Listen to the atis to get the information !!!
Once you get your information eg. Alpha you can proceed. If no ATIS available simply say no Information or dont mention it, Listen out for.

<span class="section-title">Delivery</span>

With Information:
Template: ${departureAirport} Delivery, this is ${callsign} at Stand ${standNumber} Aircraft type ${aircraftType} Request IFR Clearance to ${arrivalAirport} with information XXX ONH XXX Onboard

Template: ${callsign} Cleared to ${arrivalAirport} via XXX Departure, Squawking

<span class="section-title">Ground</span>

Tip If you not aware how to move on ground at certain airport, google airport ICAO and chart eg. EGKK Charts, and find ground charts, there you will see taxi ways and holding points.

Pushback :tractor:

Template: ${departureAirport} Ground, ${callsign} at stand ${standNumber} , Aircraft Type request Push and Start
ATC ${callsign} Push and Start Approved facing South

Template: Push and Start Approved facing South ${callsign}

<span class="section-title">Taxi</span>

Template: ${departureAirport} Ground, ${callsign} Pushed back from stand ${standNumber} request taxi.
ATC
${callsign} Taxi to Holding point Via Taxiway
Example to what ATC might say, ${callsign} Taxi to Holding point Juliet 2, via Kilo, Qubec, Juliet.

Template: Taxi to Holding point Via Taxiway , ${callsign}
ONCE YOU APPROACH THE HOLDING POINT YOU GET TOLD TO CONTACT TOWER

<span class="section-title">Tower</span>

Sometimes when you contact tower he might tell you to go to another holding point.

Template: ${callsign} With you, taxing to Holding point

ATC ${callsign} taxi to Juliet 2 and hold.

Template: Taxi and Hold, juliet 2. ${callsign}

ATC ${callsign} You are clear for takeoff Runway Runway Number

Template: Clear for takeoff runway Runway Number , ${callsign}
Once you take off you will get told to contact a Centre if online, if not you get told to monitor unicom on 122.800

ATC ${callsign} No Further ATC service available monitor unicom on 122.800
Template: ${callsign} Moving to 122.800, bye bye.


<span class="section-title">In Centre</span>

On First Contact
Template: Centre Name , ${callsign} With you at Flight Level Inbound Waypoint
ATC ${callsign} Identified.

Now sometimes the atc might tell you to direct to another waypoint due to traffic or him being bored, e.g.
ATC ${callsign} Identified, Direct to Waypoint

Template:Directing to Waypoint , ${callsign}

Once you Leave a Sector you get told to monitor unicom, or if available contact another sector

If you are reaching T/D ( Top Of Descent ) Simply by informing the controller:

Template: ${callsign} approaching top of descent.
ATC ${callsign} Descent to Flight Level

Template: ${callsign} Descending to Flight Level
If you are approaching your airport after Top Of Descent and still in Centres sector, he will tell you to contact the arrival airport Approach if available, if not he will help you with the approach, that is of course if the sector control is controlling your area.


<span class="section-title">How to talk to ATC ( Approach )</span>
If Approach is Available you would contact them
Tip: If you dont have a certain STAR because your AIRAC is outdated, simply say unable to do that arrival, something in those lines.

Template: ${callsign} With you Descending to Flight level
What ATC might say?
ATC ${callsign} Identified, expect STAR Arrival for runway Runway Number
ATC ${callsign} Identified, expect vectors to runway Runway Number

How to Reply?
Template:Expect STAR Arrival for runway Runway Number , ${callsign}

Template:Expect vectors to runway Runway Number ${callsign}

Once you approach the runway, and around 25 miles away or so, you will get told to contact tower
( If tower is available )

ATC ${callsign} Contact ${arrivalAirport} Tower on Frequency

Template: Contacting ${arrivalAirport} Tower on Frequency , ${callsign}

BEFORE CONTACTING TOWER
If ATIS for arrival airport is available make sure to listen to it as you will need the information code for arrival too for a landing clearance, if no atis, simply dont give the atis code.
Also if you didnt get a STAR, simply just say you on vectors


<span class="section-title">Contacting Tower</span>

Template: ${arrivalAirport} Tower, ${callsign} with a STAR Arrival, request landing clearance for runway 25L with information ATIS information
<u>YOU CAN ALSO SAY YOU ARE ON FINAL, OR WITH YOU APPROACHING RUNWAY</u> #/b][/u][/i]

ATC ${callsign} Clear to land Runway Runway Number ( ATC will also give some information about weather

<span class="section-title">How to talk to ATC ( At Arrival )</span>

On landing ATC will probably tell you when to turn off, also depending on airport he will tell you what Holding point to turn off at and what side, which is why charts are important.

Once turned off Tower will tell you to contact ground if available

ATC ${callsign} Contact ground on Frequency

Template: Contacting ${arrivalAirport} on Frequency , ${callsign}

<span class="section-title">Ground</span>
Template: ${arrivalAirport} , ${callsign} with you Holding point , request taxi to Say where you want to taxi to
ATC ${callsign} Taxi to stand ${standNumber} via Taxiways

Template: Taxing to stand ${standNumber} via Taxiways , ${callsign}
Just a note, sometimes centres might give you a new squawk code.`;

    // Replace placeholders in the base text with input values
    var updatedText = baseATCText
      .replace(/\$\{departureAirport\}/g, departureAirport)
      .replace(/\$\{callsign\}/g, callsign)
      .replace(/\$\{standNumber\}/g, standNumber) // Use the validated standNumber
      .replace(/\$\{arrivalAirport\}/g, arrivalAirport)
      .replace(/\$\{aircraftType\}/g, aircraftType); // Use the selected aircraft type

    // Get the text container element
    var textContainer = document.getElementById('textContainer');

    // Set the content of the text container using innerHTML
    textContainer.innerHTML = updatedText;

    // Make the text container visible
    textContainer.style.display = 'block';

    // --- Clear the input fields after processing (whether valid or not) ---
    departureAirportInput.value = '';
    callsignInput.value = '';
    standNumberInput.value = ''; // Clear the invalid stand number
